# CI: every push re-proves every promise (docs/14-ENGINEERING-RULES.md §tests).
name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt + clippy + tests (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install FFmpeg (keg-only, matches .cargo/config.toml)
        run: brew install ffmpeg@7
      - name: FFmpeg version for the cache key (Cellar paths are versioned;
              a cached rusty_ffmpeg build script must not outlive its keg)
        id: ffver
        run: echo "v=$(brew list --versions ffmpeg@7 | awk '{print $2}')" >> "$GITHUB_OUTPUT"
      - uses: Swatinem/rust-cache@v2
        with:
          key: ffmpeg-${{ steps.ffver.outputs.v }}
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      # Release-mode compile check: some deps expose fields/APIs only under
      # `#[cfg(debug_assertions)]` (egui's `Style::debug` is one), so code that
      # touches them builds in the debug jobs above but breaks the release
      # build the owner actually runs. A cheap `cargo check --release` catches
      # that class of bug without a full optimised build.
      - name: Release-mode compile check (owner runs --release)
        run: cargo check --workspace --release

  windows:
    name: tests (Windows — the shipping target, with media)
    runs-on: windows-latest
    env:
      # BtbN "shared, GPL" build: GPL matches Lumit's licence, shared gives the
      # import libs + DLLs rsmpeg links against, n7.1 matches the macOS keg ffmpeg@7.
      FFMPEG_ASSET: ffmpeg-n7.1-latest-win64-gpl-shared-7.1
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      # FFmpeg 7.1 dev libs for lumit-media. rusty_ffmpeg links the import libs in
      # FFMPEG_LIBS_DIR and reads headers from FFMPEG_INCLUDE_DIR (it ignores
      # pkg-config on Windows); the DLLs and the ffmpeg CLI (test fixtures) go on
      # PATH. See docs/impl/phase-0-kickoff.md slice 4 and docs/GUIDE.md.
      - name: Install FFmpeg 7.1 (BtbN shared build)
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/$env:FFMPEG_ASSET.zip"
          Invoke-WebRequest -Uri $url -OutFile "$env:RUNNER_TEMP\ffmpeg.zip"
          Expand-Archive "$env:RUNNER_TEMP\ffmpeg.zip" -DestinationPath "$env:RUNNER_TEMP\ffmpeg"
          $root = (Get-ChildItem "$env:RUNNER_TEMP\ffmpeg" -Directory | Select-Object -First 1).FullName
          "FFMPEG_LIBS_DIR=$root\lib"        >> $env:GITHUB_ENV
          "FFMPEG_INCLUDE_DIR=$root\include" >> $env:GITHUB_ENV
          "$root\bin"                        >> $env:GITHUB_PATH
      # bindgen (via rusty_ffmpeg) needs libclang. Pin LLVM 18: bindgen 0.71 emits
      # broken opaque structs against very new libclang (20+). Installed to a temp
      # dir so it never clashes with any LLVM preinstalled on the runner.
      - name: Install LLVM 18 (libclang for bindgen)
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "18.1.8"
          directory: ${{ runner.temp }}/llvm
      - name: Point bindgen at libclang
        shell: pwsh
        run: |
          "LIBCLANG_PATH=$env:RUNNER_TEMP\llvm\bin" >> $env:GITHUB_ENV
      - uses: Swatinem/rust-cache@v2
      # The shipping target runs the full gate, media included — this is the parity
      # the desktop-dev setup unlocked (previously Windows built --no-default-features).
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  linux:
    name: tests (Linux, with media)
    runs-on: ubuntu-latest
    env:
      # The same BtbN "shared, GPL" n7.1 build the Windows job takes, so all
      # three platforms link an identical FFmpeg. The distro's own is 6.x,
      # which the crate's `ffmpeg7_1` feature does not match.
      FFMPEG_ASSET: ffmpeg-n7.1-latest-linux64-gpl-shared-7.1
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      # The desktop stack's system libraries: ALSA (cpal), GL/EGL (eframe's
      # glow backend), X11 / Wayland / xkb (winit), and Mesa's lavapipe so
      # wgpu finds a software Vulkan adapter for the GPU oracles. Plus
      # libclang for bindgen — the distro's own clang 18, which is exactly the
      # pin Windows downloads. (The upstream LLVM tarball is the wrong tool
      # here: it links libtinfo.so.5, an ncurses ABI Ubuntu 24.04 dropped, so
      # bindgen cannot dlopen it.)
      - name: Install desktop build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libasound2-dev libgl-dev libegl-dev \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libx11-dev libxcursor-dev libxi-dev libxrandr-dev libxcb1-dev \
            libwayland-dev mesa-vulkan-drivers libclang-18-dev
      - name: Install FFmpeg 7.1 (BtbN shared build)
        run: |
          url="https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/${FFMPEG_ASSET}.tar.xz"
          curl -fsSL "$url" -o "$RUNNER_TEMP/ffmpeg.tar.xz"
          mkdir -p "$RUNNER_TEMP/ffmpeg"
          tar -xJf "$RUNNER_TEMP/ffmpeg.tar.xz" -C "$RUNNER_TEMP/ffmpeg" --strip-components=1
          root="$RUNNER_TEMP/ffmpeg"
          # The tarball's .pc files carry the build machine's prefix, so
          # pkg-config would emit -L/-I paths that do not exist here. Point
          # them at where we actually unpacked.
          sed -i "s|^prefix=.*|prefix=$root|" "$root"/lib/pkgconfig/*.pc
          echo "FFMPEG_PKG_CONFIG_PATH=$root/lib/pkgconfig" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$root/lib" >> "$GITHUB_ENV"
          echo "$root/bin" >> "$GITHUB_PATH"
      # bindgen wants LLVM 18 exactly (newer libclang makes it emit opaque FFI
      # structs and rsmpeg stops compiling) — installed above from the distro.
      - name: Point bindgen at libclang
        run: echo "LIBCLANG_PATH=/usr/lib/llvm-18/lib" >> "$GITHUB_ENV"
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace --exclude lumit-gpu
      # The GPU oracles single-threaded (the project convention), so a software
      # rasteriser neither races nor thrashes. They skip themselves when no
      # adapter is present, so this can only fail on a real regression.
      - name: GPU oracle tests (lavapipe software Vulkan)
        run: cargo test -p lumit-gpu -- --test-threads=1
      - name: Release-mode compile check
        run: cargo check --workspace --release

  coverage:
    name: engine-crate coverage gate
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Install FFmpeg (keg-only, matches .cargo/config.toml)
        run: brew install ffmpeg@7
      - name: FFmpeg version for the cache key
        id: ffver
        run: echo "v=$(brew list --versions ffmpeg@7 | awk '{print $2}')" >> "$GITHUB_OUTPUT"
      - uses: Swatinem/rust-cache@v2
        with:
          key: ffmpeg-${{ steps.ffver.outputs.v }}
      # Engine crates must hold the line; the threshold may rise, never fall.
      # The FFmpeg-free engine crates are all gated (measured 87–99% locally).
      # lumit-gpu is held out while its kernel tests skip on adapterless runners;
      # UI crates join once the egui_kittest harness lands.
      - run: >
          cargo llvm-cov
          -p lumit-core -p lumit-project -p lumit-eval
          -p lumit-cache -p lumit-flow -p lumit-text -p lumit-keymap
          --fail-under-lines 80

  flatpak:
    name: flatpak bundle (installs on any distro)
    runs-on: ubuntu-latest
    container:
      # Carries flatpak + flatpak-builder and the freedesktop 25.08 SDK the
      # manifest builds against (24.08's Rust is 1.89; the tree needs 1.92).
      image: ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-25.08
      options: --privileged
    steps:
      - uses: actions/checkout@v5
      # A Flatpak build runs offline, so every crate in the lockfile has to be
      # declared as a source. Mechanical from Cargo.lock, so it is generated
      # here rather than committed (see the manifest's header).
      - name: Generate the offline cargo sources
        env:
          GENERATOR: https://raw.githubusercontent.com/flatpak/flatpak-builder-tools/master/cargo/flatpak-cargo-generator.py
        run: |
          python3 -m pip install --user aiohttp toml ||
            python3 -m pip install --break-system-packages aiohttp toml
          curl -fsSL -o /tmp/generator.py "$GENERATOR"
          python3 /tmp/generator.py Cargo.lock -o packaging/flatpak/cargo-sources.json
      # Publishes the bundle as a run artifact: what a Linux tester installs
      # with `flatpak install lumit.flatpak`, whatever distribution they run.
      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: lumit.flatpak
          manifest-path: packaging/flatpak/io.github.luminalmvm.Lumit.yml
          cache-key: flatpak-builder-${{ github.sha }}

  no-hex-outside-theme:
    name: design-token lint (no hex literals outside the theme module)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: |
          hits=$(grep -rnE 'Color32::from_rgb|#[0-9a-fA-F]{6}' crates --include='*.rs' \
            | grep -v 'crates/lumit-ui/src/theme.rs' || true)
          if [ -n "$hits" ]; then
            echo "Colour values outside lumit_ui::theme (docs/15-DESIGN.md):"
            echo "$hits"
            exit 1
          fi
